<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knuckle Biometrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>Knuckle Authentication</h1>
    
    <div class="tabs">
        <div class="tab" data-mode="register">Register</div>
        <div class="tab active" data-mode="verify">Verify</div>
    </div>

    <div class="form-group">
        <label for="user_id">User ID</label>
        <input type="text" id="user_id" placeholder="e.g., UserA1" autocomplete="off">
    </div>

    <div class="form-group">
        <label>Knuckle Image</label>
        <div class="dropzone" id="dropzone">
            <div id="dropzone-text">
                <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:var(--text-muted); padding-bottom:10px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <br>Click or drag image here
            </div>
            <img id="preview" class="preview" alt="Preview">
            <input type="file" id="file-input" style="display:none" accept="image/*">
        </div>
    </div>

    <button class="btn btn-primary" id="main-btn">
        <span id="btn-text">Verify Identity</span>
        <div id="loader" class="loader"></div>
    </button>
    
    <button class="btn btn-secondary" id="viz-btn">
        Admin Visualize Matches
    </button>

    <div id="result-box"></div>
    <img id="visualize-img" alt="SIFT Matches">
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
